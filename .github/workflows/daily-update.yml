name: Daily Releases Update

on:
  schedule:
    # 05:00 UTC corrisponde alle 06:00 CET (o 07:00 CEST)
    - cron: '0 5 * * *'
  workflow_dispatch: # Permette anche di avviarlo a mano dal tab "Actions"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node update.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Esegue il commit solo se ci sono stati dei cambiamenti
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Aggiornamento automatico catalogo ore 06:00"
            git pull --rebase origin main
            git push
          fi