<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Hub - Le nuove uscite in Italia</title>
    <!-- Font moderni e Icone FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #1a1a2e; --card-bg: #16213e; --text-color: #e2e8f0; --accent-color: #0f3460; --highlight: #e94560; --netflix: #e50914; --prime: #00a8e1; --disney: #0063e5; --discovery: #ffc107; --cinema: #6c757d; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        
        header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, var(--accent-color) 0%, transparent 100%); position: relative; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.2rem; color: #a0aec0; margin-bottom: 5px; }
        #last-update-text { font-size: 0.9rem; color: #888; font-style: italic; margin-bottom: 20px; }
        
        .nav-button { position: absolute; top: 20px; left: 20px; background-color: var(--highlight); color: white; border: none; padding: 10px 20px; font-size: 0.9rem; border-radius: 30px; cursor: pointer; font-family: 'Montserrat', sans-serif; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s;}
        .nav-button:hover { transform: scale(1.05); }

        /* Stile per i Filtri */
        .filters-container { display: flex; gap: 15px; justify-content: center; margin-top: 25px; flex-wrap: wrap; align-items: center;}
        .filters-container select { padding: 10px 15px; border-radius: 6px; background: var(--card-bg); color: white; border: 1px solid var(--accent-color); font-family: 'Montserrat', sans-serif; cursor: pointer; font-size: 0.95rem; }
        .filters-divider { width: 2px; height: 30px; background: rgba(255,255,255,0.2); margin: 0 5px; }
        
        #loader { display: none; text-align: center; padding: 50px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--highlight); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        main { flex: 1; padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        #results { display: grid; gap: 40px; }
        
        /* Modifiche per le icone negli Header di Sezione */
        .platform-section { margin-bottom: 20px; }
        .platform-header { font-size: 1.8rem; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #333; display: flex; align-items: center; gap: 12px; }
        .platform-header i, .platform-header img { font-size: 1.5rem; width: 35px; text-align: center;}
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* Modifiche Card per ripristinare il design con Immagini e Badge */
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-top: 4px solid var(--highlight); display: flex; flex-direction: column; position: relative; overflow: hidden;}
        .card.netflix { border-color: var(--netflix); }
        .card.prime { border-color: var(--prime); }
        .card.disney { border-color: var(--disney); }
        .card.discovery { border-color: var(--discovery); }
        .card.cinema { border-color: var(--cinema); }
        
        .card .poster { width: 100%; height: 350px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background: #2a2a2a; }
        .card .badge { position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; border: 1px solid var(--highlight); backdrop-filter: blur(4px); }
        .card h3 { margin-top: 0; font-size: 1.3rem; margin-bottom: 8px; line-height: 1.2; }
        .card .date { color: #a0aec0; font-size: 0.9rem; margin-bottom: 15px; display: block;}
        .card .description { line-height: 1.5; font-size: 0.95rem; flex-grow: 1; }
        
        /* Footer della card con l'icona */
        .card .platform-label { margin-top: 15px; font-size: 0.8rem; color: #888; font-weight: bold; text-transform: uppercase; text-align: right; display: flex; justify-content: flex-end; align-items: center; gap: 8px;}
        .card .platform-label i { font-size: 1.1rem; }
        .card .platform-label img { width: 16px; height: 16px; object-fit: contain;}
        
        footer { text-align: center; padding: 20px; background: #111; font-size: 0.9rem; margin-top: auto; color: #666; }

        /* Media query per mobile */
        @media (max-width: 600px) {
            .nav-button { position: relative; top: 0; left: 0; display: inline-flex; margin-bottom: 20px; justify-content: center;}
        }
    </style>
</head>
<body>
    <header>
        <a href="./top.html" class="nav-button"><i class="fa-solid fa-fire"></i> I Più Visti (Top 10)</a>
        <h1>Nuove Uscite: Cinema e Streaming</h1>
        <p>Le ultime novità in Italia con Locandine HD (powered by TMDB) e Filtri Interattivi</p>
        <div id="last-update-text">Ultimo aggiornamento database: Ricerca in corso...</div>
        
        <div class="filters-container" id="filters">
            <!-- Filtro Piattaforma -->
            <select id="filter-platform" onchange="renderApp()">
                <option value="all">🌍 Tutte le Piattaforme</option>
                <option value="netflix">Netflix</option>
                <option value="prime">Amazon Prime Video</option>
                <option value="disney">Disney+</option>
                <option value="cinema">Cinema</option>
                <option value="discovery">Discovery+</option>
            </select>
            
            <!-- Filtro Tipologia -->
            <select id="filter-type" onchange="renderApp()">
                <option value="all">🍿 Tutti i Titoli</option>
                <option value="movie">🎬 Solo Film</option>
                <option value="tv">📺 Solo Serie TV</option>
            </select>
            
            <div class="filters-divider"></div>
            
            <!-- Filtro Vista -->
            <select id="filter-view" onchange="renderApp()">
                <option value="platform">📱 Raggruppa per Piattaforma</option>
                <option value="list">📝 Lista Unica (Griglia)</option>
            </select>
        </div>
    </header>

    <main>
        <div id="loader">
            <div class="spinner"></div>
            <p id="loader-text" style="margin-top: 15px;">Caricamento dati...</p>
        </div>
        <div id="results"></div>
    </main>

    <footer>Dati auto-aggiornati ogni mattina alle 06:00. Immagini fornite da TMDB.</footer>

    <script>
        let currentData = [];

        // L'ordine qui determina anche l'ordine di stampa nella vista Raggruppata
        const ORDERED_PLATFORMS = ["Netflix", "Amazon Prime Video", "Disney+", "Cinema in Italia", "Discovery+"];

        // --- SISTEMA DI MAPPATURA ICONE E PIATTAFORME ---
        const PLATFORM_CONFIG = {
            "netflix": { iconHtml: '<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" style="height: 20px; object-fit: contain;">', className: 'netflix' },
            "prime": { iconHtml: '<img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png" alt="Prime Video" style="height: 20px; object-fit: contain; filter: brightness(0) invert(1);">', className: 'prime' },
            "disney": { iconHtml: '<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" alt="Disney+" style="height: 35px; object-fit: contain;">', className: 'disney' },
            "discovery": { iconHtml: '<img src="https://logodownload.org/wp-content/uploads/2021/04/discovery-plus-logo.png" alt="Discovery+" style="height: 22px; object-fit: contain; filter: brightness(0) invert(1);">', className: 'discovery' },
            "cinema": { iconHtml: '<i class="fa-solid fa-film" style="color: #6c757d;"></i>', className: 'cinema' },
            "default": { iconHtml: '<i class="fa-solid fa-tv"></i>', className: 'cinema' }
        };

        function getPlatformConfig(platformName) {
            const name = String(platformName).toLowerCase();
            if (name.includes('netflix')) return PLATFORM_CONFIG.netflix;
            if (name.includes('prime') || name.includes('amazon')) return PLATFORM_CONFIG.prime;
            if (name.includes('disney')) return PLATFORM_CONFIG.disney;
            if (name.includes('discovery')) return PLATFORM_CONFIG.discovery;
            if (name.includes('cinema')) return PLATFORM_CONFIG.cinema;
            return PLATFORM_CONFIG.default;
        }
        // ---------------------------------

        window.onload = () => {
            loadLocalData();
        };

        async function loadLocalData() {
            const loader = document.getElementById('loader');
            const resultsDiv = document.getElementById('results');
            
            loader.style.display = "block";
            resultsDiv.innerHTML = "";
            
            try {
                // Fetch del file data.json pubblico caricato su GitHub Pages
                // Aggiungiamo un timestamp per evitare che il browser metta in cache una vecchia versione
                const timestamp = new Date().getTime();
                const response = await fetch(`./data.json?t=${timestamp}`);
                
                if (!response.ok) {
                    throw new Error(`Errore caricamento dati: ${response.status}`);
                }

                const jsonData = await response.json();
                
                currentData = jsonData.data || []; 
                document.getElementById('last-update-text').innerText = `Ultimo aggiornamento database: ${jsonData.date}`;
                
                renderApp(); 
                
            } catch (error) {
                console.error("Errore lettura:", error);
                document.getElementById('last-update-text').innerText = `Ultimo aggiornamento database: Errore`;
                resultsDiv.innerHTML = `<p style="color:var(--highlight); text-align:center;">
                    Impossibile caricare il database.<br>
                    ${error.message}<br><br>
                    (L'aggiornamento automatico delle 06:00 potrebbe non essere ancora avvenuto o andato in errore)
                </p>`;
            } finally {
                loader.style.display = "none";
            }
        }

        // --- MOTORE DI RENDER E FILTRI COMBINATI ---
        function renderApp() {
            const filterPlatform = document.getElementById('filter-platform').value;
            const filterType = document.getElementById('filter-type').value;
            const filterView = document.getElementById('filter-view').value;
            const resultsDiv = document.getElementById('results');

            // 1. Filtra i dati combinando Entrambi i filtri
            let filteredData = currentData.filter(item => {
                const itemType = String(item.type || '').toLowerCase();
                const itemPlatform = String(item.platform || '').toLowerCase();
                
                // Condizione Tipologia
                let matchType = true;
                if (filterType === 'movie') matchType = (itemType.includes('movie') || itemType.includes('film'));
                else if (filterType === 'tv') matchType = (itemType.includes('tv') || itemType.includes('serie'));

                // Condizione Piattaforma
                let matchPlatform = true;
                if (filterPlatform !== 'all') {
                    if (filterPlatform === 'netflix') matchPlatform = itemPlatform.includes('netflix');
                    else if (filterPlatform === 'prime') matchPlatform = (itemPlatform.includes('prime') || itemPlatform.includes('amazon'));
                    else if (filterPlatform === 'disney') matchPlatform = itemPlatform.includes('disney');
                    else if (filterPlatform === 'discovery') matchPlatform = itemPlatform.includes('discovery');
                    else if (filterPlatform === 'cinema') matchPlatform = itemPlatform.includes('cinema');
                }

                return matchType && matchPlatform;
            });

            if (filteredData.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center;'>Nessun titolo trovato per questa combinazione di filtri.</p>";
                return;
            }

            let html = "";
            
            // 2. Disegna i Dati
            if (filterView === 'platform') {
                // Ordiniamo le piattaforme usando l'array fisso ORDERED_PLATFORMS
                const availablePlatforms = [...new Set(filteredData.map(item => item.platform))];
                
                // Ordina in base all'indice in ORDERED_PLATFORMS, oppure mettili in fondo se non mappati esattamente
                availablePlatforms.sort((a, b) => {
                    const idxA = ORDERED_PLATFORMS.findIndex(p => a.toLowerCase().includes(p.toLowerCase().replace(' in italia','')));
                    const idxB = ORDERED_PLATFORMS.findIndex(p => b.toLowerCase().includes(p.toLowerCase().replace(' in italia','')));
                    return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
                });

                availablePlatforms.forEach(plat => {
                    const platConfig = getPlatformConfig(plat);
                    
                    html += `<div class="platform-section">
                                <h2 class="platform-header">${platConfig.iconHtml} ${plat}</h2>
                                <div class="cards-grid">`;
                    
                    const platItems = filteredData.filter(item => item.platform === plat);
                    platItems.forEach(item => { html += generateCard(item); });
                    html += `</div></div>`;
                });
            } else {
                // Vista Griglia Unica
                html += `<div class="cards-grid">`;
                filteredData.forEach(item => { html += generateCard(item); });
                html += `</div>`;
            }

            resultsDiv.innerHTML = html;
        }

        function generateCard(item) {
            const platConfig = getPlatformConfig(item.platform);
            const pClass = platConfig.className;
            
            const title = String(item.title || 'Titolo Sconosciuto');
            const cleanTitle = encodeURIComponent(title);
            const fallbackImg = `https://via.placeholder.com/300x450/16213e/e2e8f0?text=${cleanTitle}`;
            
            const posterUrl = String(item.posterUrl || '');
            const imgSrc = (posterUrl.length > 5 && posterUrl.startsWith('http')) ? posterUrl : fallbackImg;

            const typeStr = String(item.type || '').toLowerCase();
            const isMovie = typeStr.includes('movie') || typeStr.includes('film');
            const typeBadge = isMovie ? '🎬 Film' : '📺 Serie TV';

            // Usiamo il displayDate esatto se disponibile
            const date = String(item.displayDate || item.date || '');
            const description = String(item.description || '');
            const platform = String(item.platform || '');

            // Lazy loading aggiunto alle immagini per efficienza
            return `
                <div class="card ${pClass}">
                    <img src="${imgSrc}" loading="lazy" onerror="this.onerror=null; this.src='${fallbackImg}';" class="poster" alt="Locandina ${title}">
                    <div class="badge">${typeBadge}</div>
                    <h3>${title}</h3>
                    <span class="date">${date}</span>
                    <div class="description">${description}</div>
                    <div class="platform-label">${platConfig.iconHtml} <span style="margin-left:5px">${platform}</span></div>
                </div>
            `;
        }
    </script>
</body>
</html>
